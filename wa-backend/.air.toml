root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  include_ext = ["go", "env", "sql"]
  exclude_dir = ["tmp", "vendor", "data"]
  exclude_file = []
  delay = 1000
  stop_on_error = true

[log]
  main_only = false

[misc]
  clean_on_exit = true
